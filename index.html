<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Finance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: #0d0d1a; color: #e8e8f0; min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding-bottom: 100px; }
  .header { padding: 52px 20px 12px; display: flex; justify-content: space-between; align-items: center; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #e8622a; }
  .header-sub { font-size: 12px; color: #666; margin-top: 2px; }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-btn { background: #1a1a2e; border: none; color: #aaa; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .month-label { font-size: 13px; font-weight: 600; min-width: 70px; text-align: center; }
  .nav { display: flex; gap: 6px; padding: 0 20px 16px; }
  .nav-btn { flex: 1; padding: 8px 4px; border-radius: 10px; border: none; cursor: pointer; font-size: 11px; font-weight: 600; background: #13132a; color: #666; transition: all .2s; font-family: 'DM Sans', sans-serif; }
  .nav-btn.active { background: #e8622a; color: #fff; }
  .content { padding: 0 20px; }
  .card { background: #13132a; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #1e1e3f; }
  .balance-card { background: linear-gradient(135deg, #0d2818, #13132a); border: 1px solid #06d6a033; }
  .balance-card.negative { background: linear-gradient(135deg, #2a0d1a, #13132a); border-color: #ff4d6d33; }
  .balance-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .balance-amount { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; color: #06d6a0; }
  .balance-amount.negative { color: #ff4d6d; }
  .balance-row { display: flex; gap: 20px; margin-top: 12px; }
  .balance-col .label { font-size: 11px; color: #666; }
  .balance-col .val { font-size: 18px; font-weight: 600; }
  .balance-col .plan { font-size: 10px; color: #444; }
  .divider { width: 1px; background: #1e1e3f; }
  .section-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  .cat-row { margin-bottom: 10px; }
  .cat-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .cat-name { font-size: 12px; color: #ccc; }
  .cat-name.over { color: #ff4d6d; }
  .cat-amount { font-size: 12px; font-weight: 600; color: #ccc; }
  .cat-amount.over { color: #ff4d6d; }
  .cat-plan { color: #444; font-weight: 400; }
  .bar-bg { background: #1a1a2e; border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; background: #06d6a0; }
  .bar-fill.warn { background: #ffd166; }
  .bar-fill.over { background: #ff4d6d; }
  .recent-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #1e1e3f; }
  .recent-item:last-child { border-bottom: none; }
  .tx-cat { font-size: 13px; font-weight: 500; }
  .tx-note { font-size: 11px; color: #555; }
  .tx-date { font-size: 10px; color: #444; }
  .tx-amount { font-weight: 700; }
  .tx-amount.expense { color: #ff4d6d; }
  .tx-amount.income { color: #06d6a0; }
  /* ADD FORM */
  .form-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #e8622a; }
  .type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .type-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; background: #1a1a2e; color: #666; font-family: 'DM Sans', sans-serif; }
  .type-btn.expense.active { background: #ff4d6d; color: #fff; }
  .type-btn.income.active { background: #06d6a0; color: #fff; }
  .form-label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  .form-input { width: 100%; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 12px; color: #fff; font-size: 16px; margin-bottom: 12px; font-family: 'DM Sans', sans-serif; -webkit-appearance: none; }
  .form-input.big { font-size: 18px; font-weight: 600; }
  .form-input:focus { outline: none; border-color: #e8622a; }
  select.form-input { font-size: 14px; }
  .submit-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; background: #e8622a; color: #fff; font-weight: 700; font-size: 16px; font-family: 'DM Sans', sans-serif; }
  /* TRANSACTIONS LIST */
  .tx-list-item { display: flex; justify-content: space-between; align-items: center; }
  .tx-info { flex: 1; }
  .tx-actions { display: flex; align-items: center; gap: 10px; }
  .del-btn { background: #1a1a2e; border: none; color: #555; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 18px; }
  .del-confirm { display: flex; gap: 4px; }
  .del-yes { background: #ff4d6d; border: none; color: #fff; border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 11px; font-family: 'DM Sans', sans-serif; }
  .del-no { background: #2a2a4a; border: none; color: #aaa; border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 11px; font-family: 'DM Sans', sans-serif; }
  /* FIXED */
  .fixed-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e1e3f; font-size: 14px; }
  .fixed-total { display: flex; justify-content: space-between; padding: 12px 0 0; font-weight: 700; font-size: 15px; }
  /* TOAST */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 22px; border-radius: 30px; z-index: 999; font-weight: 600; font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.4); white-space: nowrap; transition: opacity .3s; }
  .empty { text-align: center; color: #444; padding: 32px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">Finance</div>
      <div class="header-sub">Osebni tracker</div>
    </div>
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="setView('dashboard')">📊 Pregled</button>
    <button class="nav-btn" id="nav-add" onclick="setView('add')">＋ Dodaj</button>
    <button class="nav-btn" id="nav-transactions" onclick="setView('transactions')">📋 Seznam</button>
    <button class="nav-btn" id="nav-fiksni" onclick="setView('fiksni')">🔒 Fiksni</button>
  </div>

  <div class="content" id="content"></div>
</div>

<script>
const STORAGE_KEY = 'finance-matevz-2026';
const MONTHS = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Avg','Sep','Okt','Nov','Dec'];

const EXPENSE_CATEGORIES = [
  'Živila','Transport','Potrošniški material & Higiena','Zdravje & Suplementi',
  'Restavracije & Bari','Zabava & Potovanja','Darila','Nakupovanje',
  'Varčevalni račun','Investicijski račun','Fiksni stroški','Nepričakovani','Drugo'
];
const INCOME_SOURCES = [
  'Starševska pomoč','BarberShop Frankolovo','Nox Aesthetics','Gigs','Drugo'
];
const FIXED_EXPENSES = [
  { name: 'Cell Phone', amount: 5 },
  { name: 'Mami telefon', amount: 40 },
  { name: 'Revolut', amount: 9 },
  { name: 'Apple Creator', amount: 13 },
  { name: 'Claude', amount: 22 },
  { name: 'Fitnes', amount: 35 },
  { name: 'iCloud', amount: 5 },
];
const FIXED_TOTAL = FIXED_EXPENSES.reduce((s, e) => s + e.amount, 0);
const PLANNED = {
  expenses: {
    'Živila': 200, 'Transport': 70, 'Potrošniški material & Higiena': 45,
    'Zdravje & Suplementi': 50, 'Restavracije & Bari': 50, 'Zabava & Potovanja': 50,
    'Darila': 40, 'Nakupovanje': 100, 'Varčevalni račun': 120,
    'Investicijski račun': 120, 'Fiksni stroški': FIXED_TOTAL, 'Nepričakovani': 0, 'Drugo': 0,
  },
  income: {
    'Starševska pomoč': 150, 'BarberShop Frankolovo': 500,
    'Nox Aesthetics': 0, 'Gigs': 0, 'Drugo': 0,
  }
};

// STATE
let state = { currentMonth: new Date().getMonth(), currentYear: new Date().getFullYear(), transactions: [] };
let currentView = 'dashboard';
let deletingId = null;
let formType = 'expense';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function fmt(n) { return '€' + Math.abs(n).toFixed(2); }

function changeMonth(dir) {
  state.currentMonth += dir;
  if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; }
  if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; }
  save();
  render();
}

function setView(v) {
  currentView = v;
  deletingId = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + v).classList.add('active');
  renderContent();
}

function getMonthTx() {
  return state.transactions.filter(t => {
    const d = new Date(t.date);
    return d.getMonth() === state.currentMonth && d.getFullYear() === state.currentYear;
  });
}

function addTransaction() {
  const amt = parseFloat(document.getElementById('f-amount').value.replace(',', '.'));
  if (!amt || amt <= 0) { showToast('Vnesi veljaven znesek!', '#ff4d6d'); return; }
  const cat = document.getElementById('f-category').value;
  const date = document.getElementById('f-date').value;
  const note = document.getElementById('f-note').value.trim();
  const tx = { id: Date.now(), date, type: formType, category: cat, amount: amt, note };
  state.transactions.unshift(tx);
  save();
  showToast(formType === 'expense' ? 'Strošek dodan ✓' : 'Prihodek dodan ✓');
  setView('dashboard');
}

function deleteTransaction(id) {
  state.transactions = state.transactions.filter(t => t.id !== id);
  save();
  deletingId = null;
  showToast('Izbrisano', '#ff4d6d');
  renderContent();
}

function confirmDelete(id) {
  deletingId = id;
  renderContent();
}

function cancelDelete() {
  deletingId = null;
  renderContent();
}

function setFormType(type) {
  formType = type;
  renderContent();
}

function showToast(msg, color = '#06d6a0') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = color;
  t.style.color = '#fff';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

function renderContent() {
  const monthTx = getMonthTx();
  const totalExp = monthTx.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0);
  const totalInc = monthTx.filter(t => t.type === 'income').reduce((s,t) => s+t.amount, 0);
  const saved = totalInc - totalExp;
  const plannedExpTotal = Object.values(PLANNED.expenses).reduce((s,v) => s+v, 0);
  const plannedIncTotal = Object.values(PLANNED.income).reduce((s,v) => s+v, 0);

  const expByCat = {};
  EXPENSE_CATEGORIES.forEach(c => expByCat[c] = 0);
  monthTx.filter(t => t.type === 'expense').forEach(t => { expByCat[t.category] = (expByCat[t.category]||0) + t.amount; });
  const incBySrc = {};
  INCOME_SOURCES.forEach(s => incBySrc[s] = 0);
  monthTx.filter(t => t.type === 'income').forEach(t => { incBySrc[t.category] = (incBySrc[t.category]||0) + t.amount; });

  const el = document.getElementById('content');

  if (currentView === 'dashboard') {
    const sign = saved >= 0 ? '+' : '-';
    const color = saved >= 0 ? '#06d6a0' : '#ff4d6d';
    let catsHtml = EXPENSE_CATEGORIES
      .filter(c => (PLANNED.expenses[c]||0) > 0 || expByCat[c] > 0)
      .map(c => {
        const actual = expByCat[c]||0;
        const planned = PLANNED.expenses[c]||0;
        const pct = planned > 0 ? Math.min((actual/planned)*100, 100) : actual > 0 ? 100 : 0;
        const over = actual > planned && planned > 0;
        const fillClass = over ? 'over' : pct > 80 ? 'warn' : '';
        return `<div class="cat-row">
          <div class="cat-header">
            <span class="cat-name ${over?'over':''}">${c}</span>
            <span class="cat-amount ${over?'over':''}">${fmt(actual)} <span class="cat-plan">/ ${fmt(planned)}</span></span>
          </div>
          <div class="bar-bg"><div class="bar-fill ${fillClass}" style="width:${pct}%"></div></div>
        </div>`;
      }).join('');

    let incsHtml = INCOME_SOURCES.map(s => {
      const actual = incBySrc[s]||0;
      const planned = PLANNED.income[s]||0;
      const pct = planned > 0 ? Math.min((actual/planned)*100,100) : 0;
      return `<div class="cat-row">
        <div class="cat-header">
          <span class="cat-name">${s}</span>
          <span class="cat-amount">${fmt(actual)} <span class="cat-plan">/ ${fmt(planned)}</span></span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');

    let recentHtml = '';
    if (monthTx.length > 0) {
      const items = monthTx.slice(0,5).map(t => `
        <div class="recent-item">
          <div>
            <div class="tx-cat">${t.category}</div>
            ${t.note ? `<div class="tx-note">${t.note}</div>` : ''}
            <div class="tx-date">${t.date}</div>
          </div>
          <div class="tx-amount ${t.type}">${t.type==='expense'?'-':'+'}${fmt(t.amount)}</div>
        </div>`).join('');
      recentHtml = `<div class="card"><div class="section-title" style="color:#888">Zadnje transakcije</div>${items}</div>`;
    }

    el.innerHTML = `
      <div class="card balance-card ${saved<0?'negative':''}">
        <div class="balance-label">Prihranki ta mesec</div>
        <div class="balance-amount ${saved<0?'negative':''}">${sign}${fmt(saved)}</div>
        <div class="balance-row">
          <div class="balance-col">
            <div class="label">Prihodki</div>
            <div class="val" style="color:#06d6a0">${fmt(totalInc)}</div>
            <div class="plan">načrt ${fmt(plannedIncTotal)}</div>
          </div>
          <div class="divider"></div>
          <div class="balance-col">
            <div class="label">Stroški</div>
            <div class="val" style="color:#ff4d6d">${fmt(totalExp)}</div>
            <div class="plan">načrt ${fmt(plannedExpTotal)}</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="section-title" style="color:#e8622a">Stroški po kategorijah</div>
        ${catsHtml}
      </div>
      <div class="card">
        <div class="section-title" style="color:#06d6a0">Prihodki po virih</div>
        ${incsHtml}
      </div>
      ${recentHtml}
    `;
  }

  else if (currentView === 'add') {
    const today = new Date().toISOString().slice(0,10);
    const cats = formType === 'expense' ? EXPENSE_CATEGORIES : INCOME_SOURCES;
    const opts = cats.map(c => `<option value="${c}">${c}</option>`).join('');
    el.innerHTML = `
      <div class="card">
        <div class="form-title">Nova transakcija</div>
        <div class="type-toggle">
          <button class="type-btn expense ${formType==='expense'?'active':''}" onclick="setFormType('expense')">Strošek</button>
          <button class="type-btn income ${formType==='income'?'active':''}" onclick="setFormType('income')">Prihodek</button>
        </div>
        <label class="form-label">Znesek (€)</label>
        <input id="f-amount" type="text" placeholder="0.00" class="form-input big" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*">
        <label class="form-label">Kategorija</label>
        <select id="f-category" class="form-input">${opts}</select>
        <label class="form-label">Datum</label>
        <input id="f-date" type="date" value="${today}" class="form-input">
        <label class="form-label">Opomba (neobvezno)</label>
        <input id="f-note" type="text" placeholder="npr. Mercator, Shell..." class="form-input">
        <button class="submit-btn" onclick="addTransaction()">Dodaj transakcijo</button>
      </div>
    `;
  }

  else if (currentView === 'transactions') {
    if (monthTx.length === 0) {
      el.innerHTML = `<div class="card"><div class="empty">Ni transakcij za ta mesec.</div></div>`;
      return;
    }
    const items = monthTx.map(t => {
      const actions = deletingId === t.id
        ? `<div class="del-confirm">
            <button class="del-yes" onclick="deleteTransaction(${t.id})">Izbriši</button>
            <button class="del-no" onclick="cancelDelete()">Ne</button>
           </div>`
        : `<button class="del-btn" onclick="confirmDelete(${t.id})">×</button>`;
      return `<div class="card tx-list-item">
        <div class="tx-info">
          <div class="tx-cat">${t.category}</div>
          ${t.note ? `<div class="tx-note">${t.note}</div>` : ''}
          <div class="tx-date">${t.date}</div>
        </div>
        <div class="tx-actions">
          <div class="tx-amount ${t.type}">${t.type==='expense'?'-':'+'}${fmt(t.amount)}</div>
          ${actions}
        </div>
      </div>`;
    }).join('');
    el.innerHTML = `<div style="font-size:13px;color:#555;margin-bottom:10px">${monthTx.length} transakcij — ${MONTHS[state.currentMonth]} ${state.currentYear}</div>${items}`;
  }

  else if (currentView === 'fiksni') {
    const rows = FIXED_EXPENSES.map(e => `
      <div class="fixed-row">
        <span>${e.name}</span>
        <span style="font-weight:600;color:#ccc">${fmt(e.amount)}</span>
      </div>`).join('');
    el.innerHTML = `
      <div class="card" style="border-color:#e8622a33">
        <div class="section-title" style="color:#e8622a">🔒 Fiksni mesečni stroški</div>
        ${rows}
        <div class="fixed-total">
          <span>SKUPAJ</span>
          <span style="color:#e8622a">${fmt(FIXED_TOTAL)}</span>
        </div>
      </div>
    `;
  }
}

function render() {
  document.getElementById('monthLabel').textContent = MONTHS[state.currentMonth] + ' ' + state.currentYear;
  renderContent();
}

load();
render();
</script>
</body>
</html>
